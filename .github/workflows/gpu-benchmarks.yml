name: gpu-benchmarks

on:
  workflow_dispatch:
    inputs:
      bench-group:
        description: Benchmark subset to run
        required: true
        default: all
        type: choice
        options:
          - all
          - fft
          - nufft
          - stft
          - radon

permissions:
  contents: read

concurrency:
  group: gpu-benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gpu-benchmarks:
    name: gpu criterion benches
    runs-on: [self-hosted, gpu, apollo]
    timeout-minutes: 180
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run GPU benchmarks
        run: |
          $benchGroups = @('${{ inputs.bench-group }}')
          ./scripts/run_gpu_benchmarks.ps1 `
            -OutputRoot '.benchmarks/gpu-runner/run-${{ github.run_id }}' `
            -BenchGroups $benchGroups

      - name: Upload GPU benchmark bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-benchmarks-run-${{ github.run_id }}
          path: .benchmarks/gpu-runner/run-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish workflow summary
        if: always()
        run: |
          $summaryPath = '.benchmarks/gpu-runner/run-${{ github.run_id }}/summary.md'
          if (Test-Path $summaryPath) {
            Get-Content $summaryPath | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
