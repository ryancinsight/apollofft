[env]
PYO3_USE_ABI3_FORWARD_COMPATIBILITY = "1"

[build]
# Enable all CPU features available on the build machine (AVX2, FMA, etc.).
# This allows LLVM to autovectorize the butterfly inner loop, processing
# 2 Complex64 (= 4 f64) per AVX2 instruction rather than one at a time.
# Only for local builds — distribution targets should omit this.
rustflags = ["-C", "target-cpu=native"]

